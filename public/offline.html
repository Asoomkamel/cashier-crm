<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>غير متصل — Cashier CRM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: white;
      border-radius: 1.5rem;
      padding: 2.5rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; }
    p  { color: #64748b; font-size: .95rem; margin-bottom: 1.5rem; line-height: 1.6; }
    button {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white;
      border: none;
      border-radius: .75rem;
      padding: .75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover { opacity: .9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📶</div>
    <h1>غير متصل بالإنترنت</h1>
    <p>
      تعذّر الاتصال بالخادم. يمكنك الاستمرار في استخدام النظام — 
      البيانات المحفوظة محلياً ستظل متاحة.
      ستتم المزامنة تلقائياً عند عودة الاتصال.
    </p>
    <button onclick="window.location.href='/'">العودة للنظام</button>
  </div>
</body>
</html>
